name: Build BypassDomain
on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 0"
  push:
    branches:
      - master
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout codebase
        uses: actions/checkout@v4       
          
      - name: Generate Domain List
        run: |
          curl -L https://raw.githubusercontent.com/gfwlist/gfwlist/master/gfwlist.txt | base64 -d > gfwlist.txt
          grep -E '^([|]{2}|[.])' gfwlist.txt  | grep -v '/' | grep -v '[*]' | grep -vE '([0-9]{1,3}\.){3}[0-9]{1,3}' | sed 's/^[|.]*//' | sort -u > BypassList.txt

      - name: Generate Reject file
        run: |
          curl -L https://raw.githubusercontent.com/TG-Twilight/AWAvenue-Ads-Rule/main/Filters/AWAvenue-Ads-Rule-Mosdns_v5.txt > ./Reject.txt
          
      - name: Check diff
        run: |
          if git diff --quiet; then
            echo "isChange=false" >> $GITHUB_ENV
          else
            echo "isChange=true" >> $GITHUB_ENV
          fi         

      - name: Git push file to branch
        if: ${{ env.isChange == 'true' }}
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add ./BypassList.txt
          git add ./Reject.txt
          git commit -m "update"
          git push -f
